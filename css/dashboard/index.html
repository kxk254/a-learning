<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="dashboard">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2 class="logo">My Dash</h2>
        <nav class="menu">
          <a href="#">Dashboard</a>
          <a href="#">Analytics</a>
          <a href="#">Users</a>
          <a href="#">Products</a>
          <a href="#">Settings</a>
        </nav>
      </aside>

      <!-- Main Content  -->
      <main class="main-content">
        <!-- Header -->
        <header class="header">
          <div>
            <h1>Dashboard</h1>
            <p>Welcome back</p>
          </div>
          <button class="profile-btn">Admin</button>
        </header>

        <!-- Cards   -->
        <section class="cards">
          <div class="card">
            <h3>Total Users</h3>
            <p>12,450</p>
          </div>
          <div class="card">
            <h3>Revenue</h3>
            <p>$34,200</p>
          </div>
          <div class="card">
            <h3>Orders</h3>
            <p>1,240</p>
          </div>
          <div class="card">
            <h3>Growth</h3>
            <p>10%</p>
          </div>
        </section>

        <!-- Content Area -->
        <section>
          <div class="panel large">
            <h2>Sales Overview</h2>
            <div class="chart-placeholder">Chart Area</div>
          </div>

          <div class="panel">
            <h2>Recent Activity</h2>
            <div class="activity">
              <span>New Order</span><small>2 mins ago</small>
            </div>
            <div class="activity">
              <span>User Registered</span><small>10 mins ago</small>
            </div>
            <div class="activity">
              <span>Payment Received</span><small>25 mins ago</small>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
