<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="../root.css" />
  </head>

  <body>
    <main class="dashboard">
      <!-- SIDEBAR  -->
      <div class="sidebar">
        <h2 class="logo">My Dash</h2>
        <nav class="menu">
          <a href="#">Dashboard</a>
          <a href="#">Analysis</a>
          <a href="#">Users</a>
          <a href="#">Products</a>
          <a href="#">Settings</a>
        </nav>
      </div>
      <div class="main-contents">
        <!-- HEADER  -->
        <header class="header">
          <div>
            <h3>Dashboard</h3>
            <p>Welcome Back</p>
          </div>
          <button class="header-btn">Admin</button>
        </header>
        <!-- CARD  -->
        <section class="cards">
          <div class="card">
            <h3>Total Users</h3>
            <span>12.450</span>
          </div>
          <div class="card">
            <h3>Revenues</h3>
            <span>$5,600</span>
          </div>
          <div class="card">
            <h3>Orders</h3>
            <span>4,578</span>
          </div>
          <div class="card">
            <h3>Growth</h3>
            <span>18%</span>
          </div>
        </section>
        <!-- CONTENT-GRID -->
        <section class="content-grid">
          <!-- panel-large  -->
          <div class="panel-large">
            <h3>Sales Overview</h3>
            <p>Chart Area</p>
          </div>
          <!-- panel -->
          <div class="panel">
            <h3>Activities</h3>
            <div class="activity">
              <span>New Order</span>
              <small>2 mins ago</small>
            </div>
            <div class="activity">
              <span>User Registered</span>
              <small>10 mins agohjh</small>
            </div>
            <div class="activity">
              <span>Payment Received</span>
              <small>25 mins ago</small>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
