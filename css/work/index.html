<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="../root.css" />
  </head>
  <body>
    <main class="container">
      <!-- Side Bar  -->
      <div class="sidebar">
        <h2>My Dash</h2>
        <nav>
          <a href="#">Dashboard</a>
          <a href="#">Analysis</a>
          <a href="#">Users</a>
          <a href="#">Products</a>
          <a href="#">Settings</a>
        </nav>
      </div>
      <!-- Main Contents -->
      <section class="main-contents">
        <!-- - header  -->
        <div class="main-header">
          <div class="main-title">
            <h3>Dashboard</h3>
            <p>Welcome Back</p>
          </div>
          <button type="submit">Admin</button>
        </div>
        <!-- - cards -->
        <div class="cards">
          <div class="card">
            <h3>Total Users</h3>
            <p>12,450</p>
          </div>
          <div class="card">
            <h3>Revenues</h3>
            <p>$5,600</p>
          </div>
          <div class="card">
            <h3>Orders</h3>
            <p>4,578</p>
          </div>
          <div class="card">
            <h3>Growth</h3>
            <p>18%</p>
          </div>
        </div>
        <!-- Sales  -->
        <section class="sales-section">
          <!-- - sales overview -->
          <div class="sales-overview">
            <h3>Sales Overview</h3>
            <p>Chart Area</p>
          </div>
          <!-- - recent activities -->
          <div class="activities">
            <div class="activity">
              <h4>New Order</h4>
              <p>2 mins ago</p>
            </div>
            <div class="activity">
              <h4>User Registered</h4>
              <p>10 mins ago</p>
            </div>
            <div class="activity">
              <h4>Payment Received</h4>
              <p>25 mins ago</p>
            </div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
