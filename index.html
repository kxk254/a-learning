<!doctype html>
<html lang="en">
  <head>
    <title>My Page</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="carousel-wrapper">
      <div class="carousel__display screen">
        <img
          class="thumbnail"
          loading="lazy"
          src="https://picsum.photos/1280/720?random=8"
          alt="Thumbnail 8"
        />
      </div>
      <nav class="carousel__nav">
        <ul
          class="carousel__nav--scroll-container carousel__track scroll--container"
          id="scroll--container"
        >
          <li class="scroll--element carousel__item">
            <button
              type="button"
              class="scroll--btn carousel__button scroll__button"
            ></button>
          </li>
          <li class="scroll--element carousel__item">
            <button
              type="button"
              class="scroll--btn carousel__button scroll__button"
            ></button>
          </li>
          <li class="scroll--element carousel__item">
            <button
              type="button"
              class="scroll--btn carousel__button scroll__button"
            ></button>
          </li>
        </ul>
        <div class="carousel__control--btn-group">
          <button
            class="carousel__control--btn prev"
            aria-controls="scroll--container"
          >
            <span class="carousel__control--icon">
              <svg
                width="16"
                height="16"
                fill="currentColor"
                class="icon-svg chevron-left"
                viewBox="0 0 16 16"
              >
                <path
                  fill-rule="evenodd"
                  d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0"
                />
              </svg>
              <svg
                width="16"
                height="16"
                fill="currentColor"
                class="icon-svg chevron-left--double"
                viewBox="0 0 16 16"
              >
                <path
                  fill-rule="evenodd"
                  d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0"
                />
              </svg>
            </span>
          </button>
          <button
            class="carousel__control--btn next"
            aria-controls="scroll--container"
          >
            <span class="carousel__control--icon">
              <svg
                width="16"
                height="16"
                fill="currentColor"
                class="icon-svg chevron-right"
                viewBox="0 0 16 16"
              >
                <path
                  fill-rule="evenodd"
                  d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708"
                />
              </svg>
              <svg
                width="16"
                height="16"
                fill="currentColor"
                class="icon-svg chevron-right--double"
                viewBox="0 0 16 16"
              >
                <path
                  fill-rule="evenodd"
                  d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708"
                />
              </svg>
            </span>
          </button>
        </div>
      </nav>
    </div>
  </body>
</html>
