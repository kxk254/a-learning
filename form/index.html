<!doctype html>
<html lang="en">
  <head>
    <title>My Page</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main>
      <span id="nameField"></span>
      <h3>Forms</h3>
      <section class="controls">
        <input type="text" id="searchInput" placeholder="Search by ID..." />
        <select id="sortSelect">
          <option value="none">Sort by ...</option>
          <option value="price-asc">Price ↑</option>
          <option value="price-dsc">Price ↓</option>
          <option value="qty-asc">Qty ↑</option>
          <option value="qty-dsc">Qty ↓</option>
        </select>
        <button id="clearFilters">Clear Filters</button>
      </section>
      <section id="dataField"></section>
      <section id="errorField"></section>

      <section>
        <form id="myForm">
          <div id="inputField"></div>
          <input type="submit" value="submit" />
        </form>
      </section>

      <section id="totalField"></section>

      <section class="actions">
        <button type="button" id="resetBtn">reset</button>
        <button type="button" id="loadBtn">load</button>
      </section>
      <section class="redoaction">
        <button type="button" id="undoBtn">undo</button>
        <button type="button" id="redoBtn">redo</button>
      </section>
    </main>

    <footer>
      <a href="../index.html">back</a>
    </footer>
    <script type="module" src="./script.js" defer></script>
  </body>
</html>
